services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception


  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    restart: unless-stopped
    depends_on:
      - mariadb
    env_file: .env
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception


  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    env_file: .env
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/html
    networks:
      - inception
    restart: unless-stopped

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      device: /home/${USER}/data/db
      o: bind

  wp_data:
    driver: local
    driver_opts:
      type: none
      device: /home/${USER}/data/wp
      o: bind

networks:
  inception:
    driver: bridge